<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceylon Airlines | Booking Registry</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .sidebar-link.active { background: #8A1538; color: white; }
        .custom-card { @apply bg-white rounded-[1.5rem] border border-slate-200 shadow-sm; }
        .btn-primary { background: #8A1538; @apply text-white px-6 py-2.5 rounded-xl font-bold transition-all hover:bg-[#6b102b] active:scale-95 flex items-center gap-2; }
        .input-field { @apply w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#8A1538] focus:border-transparent outline-none transition-all; }
        .label-text { @apply text-[11px] font-black uppercase tracking-wider text-slate-400 mb-1 block ml-1; }

        /* Modal Animation */
        .modal-enter { animation: modalIn 0.3s ease-out forwards; }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>

<body class="antialiased">

<!-- Main -->
<main class="p-6 min-h-screen">

    <div class="flex justify-between items-center mb-8">
        <div>
            <h2 class="text-2xl font-extrabold text-slate-800">Booking & Seat Registry</h2>
            <p class="text-sm text-slate-500">Inventory control and passenger seat assignments</p>
        </div>
        <button onclick="openModal()" class="btn-primary">
            <i class="fa-solid fa-plus"></i>
            Create New Booking
        </button>
    </div>

    <!-- Stats Bar -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="custom-card p-5 flex items-center gap-4 border-l-4 border-l-[#8A1538]">
            <div class="bg-red-50 p-3 rounded-full text-[#8A1538]">
                <i class="fa-solid fa-ticket h-5 w-5 flex items-center justify-center"></i>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase">Total Bookings</p>
                <h3 id="total-count" class="text-xl font-bold text-slate-800">0</h3>
            </div>
        </div>
        <div class="custom-card p-5 flex items-center gap-4">
            <div class="bg-blue-50 p-3 rounded-full text-blue-600">
                <i class="fa-solid fa-plane-departure h-5 w-5 flex items-center justify-center"></i>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase">Active Flights</p>
                <h3 class="text-xl font-bold text-slate-800">12</h3>
            </div>
        </div>
        <div class="custom-card p-5 flex items-center gap-4">
            <div class="bg-emerald-50 p-3 rounded-full text-emerald-600">
                <i class="fa-solid fa-chair h-5 w-5 flex items-center justify-center"></i>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase">Avg Occupancy</p>
                <h3 class="text-xl font-bold text-slate-800">84%</h3>
            </div>
        </div>
    </div>

    <!-- Table Container -->
    <div class="custom-card overflow-hidden">
        <div class="p-4 bg-slate-50/50 border-b flex flex-wrap justify-between items-center gap-4">
            <div class="flex gap-4 flex-1">
                <div class="relative w-full max-w-xs">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Search PNR or Passenger..." class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-[#8A1538]/20">
                </div>
                <select class="px-4 py-2 border border-slate-200 rounded-xl text-xs bg-white font-medium text-slate-600">
                    <option>All Flight IDs</option>
                    <option>501 (Colombo-London)</option>
                    <option>503 (Colombo-Paris)</option>
                </select>
            </div>
            <div class="flex gap-2">
                <button class="p-2 text-slate-400 hover:text-slate-600"><i class="fa-solid fa-file-export"></i></button>
                <button class="p-2 text-slate-400 hover:text-slate-600"><i class="fa-solid fa-print"></i></button>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm">
                <thead>
                <tr class="bg-white border-b text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                    <th class="px-6 py-4">PNR Reference</th>
                    <th class="px-6 py-4">Passenger Identity</th>
                    <th class="px-6 py-4">Flight ID</th>
                    <th class="px-6 py-4 text-center">Seat</th>
                    <th class="px-6 py-4 text-right">Operations</th>
                </tr>
                </thead>
                <tbody id="booking-table-body" class="divide-y divide-slate-100">
                <!-- Dynamic Content -->
                </tbody>
            </table>
        </div>
    </div>
</main>

<!-- Create Booking Modal -->
<div id="bookingModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-lg rounded-[2rem] shadow-2xl overflow-hidden modal-enter">
        <div class="p-8 bg-[#8A1538] text-white flex justify-between items-center">
            <div>
                <h3 class="text-xl font-bold">New Passenger Booking</h3>
                <p class="text-red-200 text-xs mt-1">Fill the manifest details below</p>
            </div>
            <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-all">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div class="p-8 space-y-5">
            <div>
                <label class="label-text">Passenger Name</label>
                <input type="text" id="m-passenger" placeholder="e.g. Kasun Jayasekara" class="input-field">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-text">Flight ID (Numeric)</label>
                    <input type="number" id="m-flightId" placeholder="e.g. 503" class="input-field">
                </div>
                <div>
                    <label class="label-text">Seat Number</label>
                    <input type="text" id="m-seat" placeholder="e.g. 12A" class="input-field font-mono uppercase">
                </div>
            </div>

            <div class="bg-slate-50 p-4 rounded-2xl border border-dashed border-slate-300">
                <label class="label-text mb-2">PNR Generation</label>
                <div class="flex items-center justify-between">
                    <span id="pnr-display" class="font-mono font-black text-lg text-[#8A1538]">CEY----</span>
                    <button onclick="generatePNR()" class="text-[10px] font-bold bg-white border px-3 py-1 rounded-lg shadow-sm hover:bg-slate-50">REGENERATE</button>
                </div>
            </div>

            <div class="flex gap-3 pt-4">
                <button onclick="closeModal()" class="flex-1 py-3 text-slate-500 font-bold hover:bg-slate-50 rounded-xl transition-all">Discard</button>
                <button onclick="saveBooking()" class="flex-[2] btn-primary justify-center shadow-lg shadow-red-100">
                    Confirm Booking
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // Initial Data following BookingDTO structure
    let bookings = [
        { id: 1, pnr: 'CEY92X', passenger: 'Kasun Jayasekara', flightId: 503, seat: '12A' },
        { id: 2, pnr: 'CEY77Y', passenger: 'Nimali Perera', flightId: 201, seat: '04C' },
        { id: 3, pnr: 'CEY41M', passenger: 'James Wilson', flightId: 503, seat: '22F' }
    ];

    let currentPNR = "";

    function renderTable() {
        const tbody = document.getElementById('booking-table-body');
        const countDisplay = document.getElementById('total-count');

        tbody.innerHTML = '';

        bookings.forEach(booking => {
            const row = `
                <tr class="hover:bg-slate-50/80 transition-all group">
                    <td class="px-6 py-4">
                        <span class="font-mono font-black text-[#8A1538] bg-red-50 px-2 py-1 rounded text-xs">${booking.pnr}</span>
                    </td>
                    <td class="px-6 py-4">
                        <p class="font-bold text-slate-700">${booking.passenger}</p>
                        <button class="text-[10px] text-blue-500 font-black hover:underline tracking-tighter uppercase">View E-Ticket</button>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                            <span class="font-bold text-slate-600">FLT-${booking.flightId}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="font-mono font-bold text-slate-500">${booking.seat}</span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="deleteBooking(${booking.id})" class="opacity-0 group-hover:opacity-100 transition-opacity text-slate-300 hover:text-red-500 p-2">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                </tr>
            `;
            tbody.insertAdjacentHTML('beforeend', row);
        });

        countDisplay.innerText = bookings.length;
    }

    function generatePNR() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let result = 'CEY';
        for (let i = 0; i < 3; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        currentPNR = result;
        document.getElementById('pnr-display').innerText = result;
    }

    function openModal() {
        document.getElementById('bookingModal').classList.remove('hidden');
        generatePNR();
    }

    function closeModal() {
        document.getElementById('bookingModal').classList.add('hidden');
        // Clear inputs
        document.getElementById('m-passenger').value = '';
        document.getElementById('m-flightId').value = '';
        document.getElementById('m-seat').value = '';
    }

    function saveBooking() {
        const passenger = document.getElementById('m-passenger').value;
        const flightId = document.getElementById('m-flightId').value;
        const seat = document.getElementById('m-seat').value;

        if (!passenger || !flightId || !seat) {
            alert("All fields are required to issue a ticket.");
            return;
        }

        const newBooking = {
            id: Date.now(),
            pnr: currentPNR,
            passenger: passenger,
            flightId: parseInt(flightId),
            seat: seat.toUpperCase()
        };

        bookings.unshift(newBooking);
        renderTable();
        closeModal();
    }

    function deleteBooking(id) {
        if(confirm("Are you sure you want to void this booking?")) {
            bookings = bookings.filter(b => b.id !== id);
            renderTable();
        }
    }

    function filterTable() {
        const input = document.getElementById("searchInput").value.toUpperCase();
        const rows = document.getElementById("booking-table-body").getElementsByTagName("tr");

        for (let i = 0; i < rows.length; i++) {
            const pnrCol = rows[i].getElementsByTagName("td")[0];
            const nameCol = rows[i].getElementsByTagName("td")[1];
            if (pnrCol || nameCol) {
                const txtValue = (pnrCol.textContent || pnrCol.innerText) + (nameCol.textContent || nameCol.innerText);
                rows[i].style.display = txtValue.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }
    }

    // Initialize
    window.onload = renderTable;
</script>

</body>
</html>
