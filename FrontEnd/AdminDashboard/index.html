<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ceylon Airlines | Pro Admin Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

    :root {
      --primary: #8A1538;
      --primary-dark: #6a102b;
      --secondary: #1e293b;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f1f5f9;
      color: #1e293b;
      overflow: hidden; /* Prevent double scrollbars */
    }

    .sidebar-link.active {
      background-color: var(--primary);
      color: white !important;
      box-shadow: 0 10px 15px -3px rgba(138, 21, 56, 0.3);
    }

    .sidebar-link i {
      transition: transform 0.3s ease;
    }

    .sidebar-link:hover i {
      transform: translateX(3px);
    }

    iframe {
      width: 100%;
      height: calc(100vh - 100px); /* Adjust height based on header */
      border: none;
      border-radius: 1.5rem;
    }
  </style>
</head>
<body class="antialiased">

<!-- Sidebar -->
<aside class="fixed top-0 left-0 z-40 w-64 h-screen transition-transform -translate-x-full sm:translate-x-0">
  <div class="h-full px-4 py-8 overflow-y-auto bg-[#0f172a] text-white">
    <div class="flex items-center gap-3 mb-10 px-2">
      <div class="bg-gradient-to-br from-[#8A1538] to-[#6a102b] p-2 rounded-xl text-white shadow-lg">
        <i class="fas fa-plane-departure text-xl"></i>
      </div>
      <h1 class="text-xl font-bold tracking-tight">Ceylon<span class="text-[#8A1538]">Air</span></h1>
    </div>

    <nav class="space-y-1" id="main-nav">
      <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-4 mb-2">Main Menu</p>

      <!-- මම මෙතන links වලට target="contentFrame" එකතු කරලා තියෙනවා -->
      <a href="Pages/dashboard.html" target="contentFrame" onclick="updateUI('Overview')" class="sidebar-link active flex items-center p-3 rounded-xl transition-all group">
        <i class="fas fa-th-large w-6"></i>
        <span class="ml-3 font-semibold text-sm">Overview</span>
      </a>

      <a href="Pages/FlightAdd.html" target="contentFrame" onclick="updateUI('Flight Operations')" class="sidebar-link flex items-center p-3 rounded-xl transition-all group text-slate-400 hover:text-white">
        <i class="fas fa-route w-6"></i>
        <span class="ml-3 font-semibold text-sm">Flights</span>
      </a>

      <a href="Pages/booking.html" target="contentFrame" onclick="updateUI('Booking Registry')" class="sidebar-link flex items-center p-3 rounded-xl transition-all group text-slate-400 hover:text-white">
        <i class="fas fa-calendar-check w-6"></i>
        <span class="ml-3 font-semibold text-sm">Bookings</span>
      </a>

      <a href="Pages/passengers.html" target="contentFrame" onclick="updateUI('Passenger Oversight')" class="sidebar-link flex items-center p-3 rounded-xl transition-all group text-slate-400 hover:text-white">
        <i class="fas fa-user-shield w-6"></i>
        <span class="ml-3 font-semibold text-sm">Passengers</span>
      </a>

      <a href="Pages/ad.html" target="contentFrame" onclick="updateUI('Ad Management')" class="sidebar-link flex items-center p-3 rounded-xl transition-all group text-slate-400 hover:text-white">
        <i class="fas fa-ad w-6"></i>
        <span class="ml-3 font-semibold text-sm">Ad</span>
      </a>
    </nav>

    <div class="mt-10 pt-10 border-t border-slate-800">
      <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-4 mb-2">System</p>
      <a href="#" class="flex items-center p-3 text-slate-400 hover:text-white transition-all">
        <i class="fas fa-cog w-6"></i>
        <span class="ml-3 font-semibold text-sm">Settings</span>
      </a>
      <a href="#" class="flex items-center p-3 text-red-400 hover:text-red-300 transition-all">
        <i class="fas fa-sign-out-alt w-6"></i>
        <span class="ml-3 font-semibold text-sm">Logout</span>
      </a>
    </div>
  </div>
</aside>

<!-- Main Content Area -->
<main class="p-6 sm:ml-64 min-h-screen">

  <!-- Top Nav -->
  <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
    <div>
      <h2 id="view-title" class="text-2xl font-extrabold text-slate-800">System Dashboard</h2>
      <div class="flex items-center gap-2 text-sm text-slate-500">
        <span class="w-2 h-2 rounded-full bg-green-500"></span>
        Operational Mode: Real-time Update
      </div>
    </div>
    <div class="flex items-center gap-3">
      <div class="hidden lg:flex flex-col text-right">
        <span class="text-xs font-bold">Admin: Vihan</span>
        <span class="text-[10px] text-slate-400 uppercase tracking-tighter">Senior Controller</span>
      </div>
      <img src="https://ui-avatars.com/api/?name=Admin+V&background=8A1538&color=fff" class="w-10 h-10 rounded-full border-2 border-white shadow-sm">
    </div>
  </header>

  <div class="bg-white rounded-[1.5rem] shadow-sm overflow-hidden border border-slate-200">
    <iframe name="contentFrame" src="Pages/dashboard.html" id="main-frame"></iframe>
  </div>

</main>

<!-- Toast Notification -->
<div id="toast" class="fixed bottom-10 right-10 z-[100] transform translate-y-20 opacity-0 transition-all duration-500">
  <div class="bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4 border border-white/10">
    <div id="toast-icon" class="w-8 h-8 bg-[#8A1538] rounded-full flex items-center justify-center">
      <i class="fas fa-info text-xs"></i>
    </div>
    <div>
      <p class="text-xs font-bold" id="toast-title">System Message</p>
      <p class="text-[10px] text-slate-400" id="toast-msg">Operation completed.</p>
    </div>
  </div>
</div>

<script>
  function updateUI(title) {
    document.getElementById('view-title').innerText = title;

    const links = document.querySelectorAll('.sidebar-link');
    links.forEach(link => {
      link.classList.remove('active', 'text-white');
      link.classList.add('text-slate-400');
    });

    event.currentTarget.classList.add('active');
    event.currentTarget.classList.remove('text-slate-400');
  }

  function showToast(title, msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toast-title').innerText = title;
    document.getElementById('toast-msg').innerText = msg;

    toast.classList.remove('translate-y-20', 'opacity-0');
    setTimeout(() => {
      toast.classList.add('translate-y-20', 'opacity-0');
    }, 3000);
  }
</script>
</body>
</html>
