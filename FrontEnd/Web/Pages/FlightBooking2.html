<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Booking UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .fare-card-active {
            transform: scale(1.05);
            z-index: 10;
        }
    </style>
</head>
<body class="text-gray-800">

<!-- Blue Top Bar -->
<header class="bg-[#0054A4] text-white p-2 text-xs md:text-sm flex justify-between items-center px-4 md:px-8 sticky top-0 z-50">
    <div class="flex space-x-8">
        <div>
            <div class="font-bold" id="route-text">ADL ----- CMB</div>
            <div class="opacity-80">Adelaide Colombo</div>
        </div>
        <div class="hidden sm:block">
            <div class="font-bold">Depart</div>
            <div class="opacity-80">Sun, 1 Mar</div>
        </div>
        <div class="hidden sm:block">
            <div class="font-bold">Passenger</div>
            <div class="opacity-80">1 Adult</div>
        </div>
    </div>
    <button class="flex items-center space-x-1 border border-white/30 px-3 py-1 rounded hover:bg-white/10 transition">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span>Booking Summary</span>
    </button>
</header>

<!-- Hero Banner -->
<div class="relative h-48 md:h-64 overflow-hidden">
    <img
            src="https://images.unsplash.com/photo-1552423011-2852ca3932a2?auto=format&fit=crop&q=80&w=2000"
            alt="Sri Lanka Bridge"
            class="w-full h-full object-cover"
    />
    <div class="absolute inset-0 bg-black/20 flex flex-col items-center justify-center">
        <div class="bg-white/90 backdrop-blur px-6 py-2 rounded-full shadow-lg flex items-center space-x-2">
            <span class="font-bold text-[#0054A4]">Adelaide to Colombo</span>
            <button class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded flex items-center">
                Modify
                <svg class="ml-1" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </button>
        </div>
    </div>
</div>

<!-- Main Content -->
<main class="max-w-5xl mx-auto -mt-12 relative px-4 pb-20">

    <!-- Flight Results -->
    <div id="flight-results" class="space-y-6"></div>

</main>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const resultsContainer = document.getElementById("flight-results");

        loadFlights();

        async function loadFlights() {
            try {
                const response = await fetch("http://localhost:8080/api/v1/flights/getAllFlight");
                if (!response.ok) {
                    resultsContainer.innerHTML = "<p class='text-center text-red-500'>Failed to load flights</p>";
                    return;
                }

                const result = await response.json();
                const flights = result.data;

                if (!flights || flights.length === 0) {
                    resultsContainer.innerHTML = "<p class='text-center text-gray-500'>No flights available</p>";
                    return;
                }

                resultsContainer.innerHTML = "";

                flights.forEach(flight => {
                    resultsContainer.appendChild(createFlightCard(flight));
                });

            } catch (error) {
                console.error("Error loading flights:", error);
                resultsContainer.innerHTML = "<p class='text-center text-red-500'>Server error</p>";
            }
        }

        function createFlightCard(flight) {
            const card = document.createElement("div");
            card.className = "bg-white rounded-lg shadow-md overflow-hidden border border-gray-200 p-6 flex justify-between items-center";

            card.innerHTML = `
            <div class="flex space-x-8 items-center">
                <div class="text-center">
                    <div class="text-lg font-bold">${flight.departureTime || "N/A"}</div>
                    <div class="text-xs font-bold text-gray-500 uppercase">${flight.departure || "N/A"}</div>
                </div>

                <div class="text-center">
                    <div class="text-sm text-gray-500">Duration</div>
                    <div class="text-xs">${flight.duration || "N/A"}</div>
                </div>

                <div class="text-center">
                    <div class="text-lg font-bold">${flight.arrivalTime || "N/A"}</div>
                    <div class="text-xs font-bold text-gray-500 uppercase">${flight.arrival || "N/A"}</div>
                </div>
            </div>

            <div class="text-right">
                <div class="text-sm text-gray-500">Price</div>
                <div class="text-xl font-bold text-[#0054A4]">${flight.price ? "AUD " + flight.price : "N/A"}</div>
                <button class="mt-2 bg-[#0054A4] text-white px-4 py-2 rounded text-sm hover:bg-[#004080]">
                    Select
                </button>
            </div>
        `;

            return card;
        }
    });
</script>
</body>
</html>
